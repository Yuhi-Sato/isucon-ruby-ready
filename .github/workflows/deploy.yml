# mainマージ時にs1/s2/s3の各サーバーへSSHで自動デプロイする。
# 使わないサーバーがある場合は、該当するジョブをまるごと削除して使うこと。
name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-s1:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-s1
      cancel-in-progress: true
    steps:
      - name: Deploy to s1
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST_S1 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            ./deploy.sh

  deploy-s2:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-s2
      cancel-in-progress: true
    steps:
      - name: Deploy to s2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST_S2 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            ./deploy.sh

  deploy-s3:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-s3
      cancel-in-progress: true
    steps:
      - name: Deploy to s3
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST_S3 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            ./deploy.sh
