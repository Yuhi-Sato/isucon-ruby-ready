# nginx.conf の http {} ブロック内に貼り付ける。
# alp ltsv (make alp) で解析するためのログフォーマット定義。

log_format ltsv "time:$time_local"
                "\thost:$remote_addr"
                "\tforwardedfor:$http_x_forwarded_for"
                "\treq:$request"
                "\tstatus:$status"
                "\tmethod:$request_method"
                "\turi:$request_uri"
                "\tsize:$body_bytes_sent"
                "\treferer:$http_referer"
                "\tua:$http_user_agent"
                "\treqtime:$request_time"
                "\tapptime:$upstream_response_time"
                "\tcache:$upstream_http_x_cache"
                "\tvhost:$host"
                "\tuserid:$upstream_http_x_user_id";
# useridはRackミドルウェアがX-User-Idレスポンスヘッダーで渡すユーザーID
# （isucon-user-behavior-analysis スキル参照）。ヘッダーが無ければ "-" が記録される。
# フィールドの順序は tool-config/duckdb/init.sql のVIEW定義と一致させること。

# server {} ブロック内の access_log もltsv形式に変更すること。
# access_log /var/log/nginx/access.log ltsv;

# アプリへproxyするlocation内に以下も追加すること
# （X-User-Idをログには残しつつ、ベンチマーカーへのレスポンスからは隠す）。
# proxy_hide_header X-User-Id;
